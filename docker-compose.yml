version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=kidbank;Username=postgres;Password=postgres
      - Jwt__SecretKey=U68CiejvLWX3/VSFWiIA23W+s1NoNjpdKUo2MGSlNxs=
      - Jwt__Issuer=KidBank
      - Jwt__Audience=KidBankApp
      - Jwt__ExpirationMinutes=60
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kidbank-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kidbank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kidbank-network

networks:
  kidbank-network:
    driver: bridge

volumes:
  postgres_data:
