version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=kidbank;Username=postgres;Password=postgres
      - ConnectionStrings__SettingsConnection=Host=db;Port=5432;Database=kidbank_settings;Username=postgres;Password=postgres
      - Jwt__SecretKey=U68CiejvLWX3/VSFWiIA23W+s1NoNjpdKUo2MGSlNxs=
      - Jwt__Issuer=KidBank
      - Jwt__Audience=KidBankApp
      - Jwt__ExpirationMinutes=60
      - Redis__ConnectionString=redis:6379
      - Encryption__Key=lVFLdtmC1xDcLU6nsAOaLKTzLAsIn7lOhNc+gncYXEg=
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kidbank-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kidbank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-settings-db.sql:/docker-entrypoint-initdb.d/init-settings-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kidbank-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kidbank-network

networks:
  kidbank-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
